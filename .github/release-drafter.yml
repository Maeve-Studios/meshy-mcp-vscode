name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "🚀 Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "🐛 Bug Fixes"
    labels:
      - "bug"
      - "fix"
      - "bugfix"
  - title: "🧰 Maintenance"
    labels:
      - "chore"
      - "dependencies"
  - title: "⚙️ CI/CD"
    labels:
      - "ci"

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - "major"
  minor:
    labels:
      - "minor"
  patch:
    labels:
      - "patch"
  default: patch

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/Maeve-Studios/meshy-mcp-vscode/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
