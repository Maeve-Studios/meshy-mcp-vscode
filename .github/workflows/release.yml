name: Release

on:
    release:
        types: [published]

jobs:
    release:
        name: Build and Release VSIX
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Package extension
              run: |
                  VERSION="${{ github.event.release.tag_name }}"
                  npx @vscode/vsce package --no-dependencies --version "${VERSION#v}"

            - name: Get VSIX filename
              id: vsix
              run: echo "file=$(ls *.vsix)" >> $GITHUB_OUTPUT

            - name: Upload VSIX to release
              run: gh release upload ${{ github.event.release.tag_name }} ${{ steps.vsix.outputs.file }}
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
